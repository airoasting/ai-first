<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="AI 문제 정의력 진단. 20개 실무 상황에서 AI 네이티브 5대 역량을 진단하고 맞춤 학습경로를 받으세요. 약 5분 소요.">

<link rel="stylesheet" href="css/common.css">

<noscript><div style="padding:40px;text-align:center;font-family:sans-serif;"><h2>이 사이트는 JavaScript가 필요합니다.</h2></div></noscript>
</head>
<body>
<header>
  <!-- 진단 → 5단계 진행 인디케이터 -->
  <div class="diag-step-progress">
    <div class="step-dot current diag-label">진단</div>
    <div class="step-line"></div>
    <a class="step-dot" href="stage1.html">1</a>
    <div class="step-line"></div>
    <a class="step-dot" href="stage2.html">2</a>
    <div class="step-line"></div>
    <a class="step-dot" href="stage3.html">3</a>
    <div class="step-line"></div>
    <a class="step-dot" href="stage4.html">4</a>
    <div class="step-line"></div>
    <a class="step-dot" href="stage5.html">5</a>
  </div>
  <a class="back-link" href="index.html">&larr; 목록으로</a>
  <h1>문제 정의력 진단</h1>
  <p>20개 실무 상황에서 AI 네이티브 역량을 진단합니다</p>
  <div class="header-badge">📋 20문항 &middot; 약 5분</div>
</header>

<main>
  <div class="container">
    <div id="pd-diag-intro" class="section-header no-border">
      <span class="section-num" id="pd-diag-section-num">진단</span>
      <span class="section-title" id="pd-diag-section-title">나의 문제 정의력은 어느 수준일까?</span>

    <p class="section-subtitle" id="pd-diag-subtitle">20개 실무 상황에서 당신의 AI 네이티브 역량을 진단합니다.</p>

    <div class="quiz-container">
      <div class="quiz-header">
        <div class="quiz-area-label" id="pd-quiz-area-label">자기주도성</div>
        <div class="quiz-progress-wrap">
          <div class="quiz-progress-bar">
            <div class="quiz-progress-fill" id="pd-quiz-progress-fill" style="width:0%"></div>
          </div>
          <span class="quiz-progress-text" id="pd-quiz-progress-text">0 / 20 완료</span>
        </div>
      </div>
      <div id="pd-quiz-question-area"></div>
      <div class="quiz-nav">
        <button class="btn-secondary" id="pd-quiz-prev-btn" onclick="pdQuizPrev()" style="display:none">← 이전</button>
        <div></div>
      </div>
    </div>
  </div>
</main>

<div id="app-footer"></div>

<script src="js/pd-data.js"></script>
<script src="js/common.js"></script>
<script src="js/pd-diagnosis.js"></script>
