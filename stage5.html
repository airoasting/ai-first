<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5단계: 결과물 완성 | AI-Native 문제해결력</title>
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/stage.css">
<style>
  .stage-header {
    text-align: center;
    padding: 48px 32px 40px;
    background: linear-gradient(135deg, #1a1a1a 0%, #2d1a1a 100%);
    border-bottom: 3px solid #C0524A;
  }
  .stage-header .back-link {
    display: inline-block;
    color: #D47870;
    text-decoration: none;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 20px;
    transition: opacity 0.2s;
  }
  .stage-header .back-link:hover { opacity: 0.7; }
  .stage-header h1 {
    font-size: 40px;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: -1px;
    margin-bottom: 8px;
  }
  .stage-header p { font-size: 17px; color: rgba(255,255,255,0.6); }
  .stage-header .header-badge {
    display: inline-block;
    font-size: 13px;
    font-weight: 600;
    color: #D47870;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(192,82,74,0.3);
    padding: 4px 16px;
    border-radius: 20px;
    margin-top: 12px;
  }

  /* ── 5단계 진행 인디케이터 ── */
  .stage-step-progress {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 28px;
  }
  .step-dot {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.18);
    color: rgba(255,255,255,0.35);
    font-size: 13px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .step-dot.done {
    background: rgba(192,82,74,0.25);
    border-color: #C0524A;
    color: #D47870;
  }
  .step-dot.current {
    background: #C0524A;
    border-color: #C0524A;
    color: #ffffff;
    box-shadow: 0 0 0 5px rgba(192,82,74,0.22);
  }
  .step-line {
    width: 36px;
    height: 2px;
    background: rgba(255,255,255,0.12);
    flex-shrink: 0;
  }
  .step-line.done { background: #C0524A; }
  a.step-dot {
    text-decoration: none;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.15s;
  }
  a.step-dot:hover {
    opacity: 0.75;
    transform: scale(1.12);
  }

  @media(max-width:768px) {
    .stage-header { padding: 36px 24px 32px; }
    .stage-header h1 { font-size: 28px; }
    .step-line { width: 20px; }
    .step-dot { width: 28px; height: 28px; font-size: 11px; }
  }

  /* 배지 숫자 강조 */
  .stage-header .header-badge strong { color: #fff; font-size: 14px; }

  /* 전제 조건 박스 */
  .prerequisite-note {
    background: rgba(251,191,36,0.08);
    border: 1px solid rgba(251,191,36,0.25);
    border-left: 3px solid #fbbf24;
    border-radius: 0 10px 10px 0;
    padding: 12px 18px;
    margin-top: 14px;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.65;
  }

  /* 프롬프트 STEP 배지 */
  .prompt-step-num {
    display: inline-block;
    background: #CC0000;
    color: #fff;
    font-size: 10px;
    font-weight: 800;
    padding: 2px 7px;
    border-radius: 4px;
    margin-right: 7px;
    letter-spacing: 0.5px;
    vertical-align: middle;
  }
  .prompt-dur { font-size: 12px; color: rgba(255,255,255,0.45); font-weight: 500; }

  /* 프롬프트 접기/펼치기 */
  .prompt-toggle-btn {
    display: block;
    background: none;
    border: none;
    color: #fb923c;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    padding: 6px 0 0;
    transition: opacity 0.2s;
  }
  .prompt-toggle-btn:hover { opacity: 0.7; }

  /* 이터레이션 복사 버튼 */
  .iteration-prompt-row { display: flex; gap: 10px; align-items: flex-start; }
  .iteration-prompt-row .iteration-prompt { flex: 1; }
  .iteration-copy-btn {
    flex-shrink: 0;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text-muted);
    font-size: 12px;
    padding: 5px 10px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s;
  }
  .iteration-copy-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* 실전 도전 섹션 부제목 */
  .stage-section-subtitle {
    font-size: 14px;
    color: var(--text-muted);
    margin: -10px 0 20px;
    line-height: 1.6;
  }

  /* 자가점검 체크리스트 */
  .self-checklist {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 26px;
    margin-bottom: 24px;
    text-align: left;
  }
  .checklist-title {
    font-size: 14px;
    font-weight: 800;
    color: var(--text-primary);
    margin-bottom: 16px;
    letter-spacing: 0.2px;
  }
  .checklist-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 11px;
    cursor: pointer;
    color: var(--text-secondary);
    font-size: 14px;
    line-height: 1.55;
    transition: color 0.2s;
  }
  .checklist-item:hover { color: var(--text-primary); }
  .checklist-cb {
    width: 16px; height: 16px;
    margin-top: 2px;
    accent-color: #16a34a;
    cursor: pointer;
    flex-shrink: 0;
  }
  .checklist-item:has(.checklist-cb:checked) {
    color: #16a34a;
    text-decoration: line-through;
    text-decoration-color: rgba(22,163,74,0.5);
  }
  .btn-stage-complete:disabled {
    opacity: 0.45 !important;
    cursor: not-allowed !important;
    transform: none !important;
    box-shadow: none !important;
  }
</style>
</head>
<body>
<header class="stage-header">
  <!-- 5단계 진행 인디케이터 -->
  <div class="stage-step-progress">
    <a class="step-dot done" href="stage1.html">1</a>
    <div class="step-line done"></div>
    <a class="step-dot done" href="stage2.html">2</a>
    <div class="step-line done"></div>
    <a class="step-dot done" href="stage3.html">3</a>
    <div class="step-line done"></div>
    <a class="step-dot done" href="stage4.html">4</a>
    <div class="step-line done"></div>
    <div class="step-dot current">5</div>
  </div>

  <a class="back-link" href="index.html">&larr; 목록으로</a>
  <h1>5단계: 결과물 완성</h1>
  <p id="stage-subtitle"></p>
  <div class="header-badge">⏱ <strong>5시간 → 1시간</strong> · 결과물 완성</div>
</header>
<div id="pd-stage-banner" data-competency="deadline"></div>

<main>
  <div class="container">

    <div class="stage-container">
      <div id="stage-content"></div>
      <div class="stage-nav" id="stage-nav"></div>
    </div>
  </div>
</main>

<div id="app-footer"></div>

<script src="js/data.js"></script>
<script src="js/common.js"></script>
<script src="js/stage.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  initCommon();
  injectStagePDBanner();
  initStage('stage5');
});
</script>
</body>
</html>
