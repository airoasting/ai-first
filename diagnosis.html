<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>진단 | AI-Native 문제해결력</title>
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/diagnosis.css">
<noscript><div style="padding:40px;text-align:center;font-family:sans-serif;"><h2>이 사이트는 JavaScript가 필요합니다.</h2></div></noscript>
</head>
<body>
<div id="app-header"></div>

<main>
  <div class="container">
    <div id="diag-intro" class="section-header no-border">
      <span class="section-num" id="diag-section-num">진단</span>
      <span class="section-title" id="diag-section-title">나는 어디서 막히고 있을까?</span>
    </div>
    <p class="section-subtitle" id="diag-subtitle">15개 실무 상황에서 당신의 행동 패턴을 봅니다.</p>

    <!-- rediag intro (hidden by default) -->
    <div class="rediag-intro section-hidden" id="rediag-intro">
      <p><strong>이전 진단 결과와 비교</strong>해드립니다. 같은 15문항에 다시 답해보세요.</p>
    </div>

    <div class="quiz-container">
      <div class="quiz-header">
        <div class="quiz-area-label" id="quiz-area-label">AI 기본기</div>
        <div class="quiz-progress-wrap">
          <div class="quiz-progress-bar">
            <div class="quiz-progress-fill" id="quiz-progress-fill" style="width:0%"></div>
          </div>
          <span class="quiz-progress-text" id="quiz-progress-text">0 / 15 완료</span>
        </div>
      </div>
      <div id="quiz-question-area"></div>
      <div class="quiz-nav">
        <button class="btn-secondary" id="quiz-prev-btn" onclick="quizPrev()" style="display:none">← 이전</button>
        <div></div>
      </div>
    </div>
  </div>
</main>

<div id="app-footer"></div>

<script src="js/data.js"></script>
<script src="js/common.js"></script>
<script src="js/diagnosis.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  initCommon();
  initDiagnosis();
});
</script>
</body>
</html>
